<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virginia Law Reference</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark">

<nav class="navbar navbar-dark bg-navy border-bottom border-warning">
    <div class="container-fluid">
        <a class="btn btn-sm btn-outline-light" href="index.html">← Home</a>
        <span class="navbar-brand">VA State Law Portal</span>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-warning mb-4">Statute Search</h2>
    
    <input type="text" id="lawSearch" class="form-control mb-4 bg-secondary text-white border-0" placeholder="Search by title or code...">

    <div id="lawContainer" class="row g-3">
        </div>
</div>

<script>
    // This script replaces the need for a Database/Node.js for now
    async function loadLaws() {
        const response = await fetch('laws.json');
        const laws = await response.json();
        const container = document.getElementById('lawContainer');
        const searchInput = document.getElementById('lawSearch');

        function displayLaws(filteredLaws) {
            container.innerHTML = filteredLaws.map(law => `
                <div class="col-md-6">
                    <div class="card bg-navy border-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title text-warning">${law.code}</h5>
                            <h6 class="card-subtitle mb-2 text-white">${law.title}</h6>
                            <p class="card-text text-light-50">${law.description}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initial display
        displayLaws(laws);

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = laws.filter(l => 
                l.title.toLowerCase().includes(term) || 
                l.code.toLowerCase().includes(term)
            );
            displayLaws(filtered);
        });
    }

    loadLaws();
</script>
</body>
</html>

name: Daily Law Update

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for merging branches later

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Runs install inside the Startup folder
        run: |
          cd Startup
          npm install

      - name: Run Scraper
        env:
          LIS_API_KEY: ${{ secrets.LIS_API_KEY }}
        run: |
          cd Startup
          node scraper.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Add the specific file relative to the repo root
          git add Startup/docs/laws.json 
          
          git commit -m "Automated law update" || exit 0
          
          # Push to main
          git push origin main
          
          # Sync to your publishing branch
          git checkout publish-site
          git merge main
          git push origin publish-site

name: Daily Law Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Scraper
        env:
          # This now matches your corrected Secret name exactly
          LIS_API_KEY: ${{ secrets.LIS_API_KEY }} 
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add docs/laws.json
          git commit -m "Automated law update" || exit 0
          
          # This pushes the new data to your main branch
          git push origin main 
          
          # This ensures the publish-site branch (your live website) also gets the update
          git checkout publish-site
          git merge main
          git push origin publish-site